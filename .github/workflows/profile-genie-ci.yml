name: ProfileGenie CI

on:
  push:
    branches: [main, dynamic-workflow-project-setup]
    paths:
      - 'ProfileGenie/**'
      - '.github/workflows/profile-genie-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ProfileGenie/**'
      - '.github/workflows/profile-genie-ci.yml'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ProfileGenie/ProfileGenie.sln

      - name: Build solution
        run: dotnet build ProfileGenie/ProfileGenie.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ProfileGenie/ProfileGenie.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format

      - name: Run format check
        run: dotnet format ProfileGenie/ProfileGenie.sln --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: profile-genie:test
          build-args: |
            PROJECT_PATH=ProfileGenie/src/ProfileGenie.Api
