version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: profilegenie-postgres
    environment:
      POSTGRES_DB: profilegenie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  apiservice:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PROJECT_PATH: ProfileGenie/src/ProfileGenie.ApiService
    container_name: profilegenie-apiservice
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__profilegenie-db=Host=postgres;Database=profilegenie;Username=postgres;Password=postgres
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PROJECT_PATH: ProfileGenie/src/ProfileGenie.Web
    container_name: profilegenie-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__apiservice__http=http://apiservice:8080
    ports:
      - "5100:8080"
    depends_on:
      - apiservice

volumes:
  postgres_data:
